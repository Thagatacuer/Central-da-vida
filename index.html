  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

ccept=\"application/json\" ref=\"{{ fileInputRef }}\" sc-camel-on-change=\"{{ handleImportFile }}\" style=\"display:none\">\n\n  <!-- SIDEBAR -->\n  <div style=\"width:236px;flex-shrink:0;background:#3B1929;display:flex;flex-direction:column;justify-content:space-between;padding:28px 18px;\">\n    <div>\n      <div style=\"display:flex;align-items:center;gap:10px;padding:0 8px 28px 8px;\">\n        <div style=\"width:34px;height:34px;border-radius:10px;background:#D94F5C;flex-shrink:0;\"><\u002Fdiv>\n        <div style=\"font-family:'Poppins',sans-serif;font-weight:700;font-size:17px;color:#FDEEF1;line-height:1.15;\">Central<br>da Vida<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:4px;\">\n        <button type=\"button\" sc-camel-on-click=\"{{ goHome }}\" style=\"display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:12px;border:none;cursor:pointer;text-align:left;background:{{ navHomeBg }};color:{{ navHomeFg }};font-weight:600;font-size:14px;\">\n          <svg width=\"18\" height=\"18\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\"><path d=\"M4 11L12 4L20 11V19A1 1 0 0 1 19 20H5A1 1 0 0 1 4 19V11Z\" stroke=\"{{ navHomeFg }}\" stroke-width=\"2\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n          Home\n        <\u002Fbutton>\n        <button type=\"button\" sc-camel-on-click=\"{{ goTasks }}\" style=\"display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:12px;border:none;cursor:pointer;text-align:left;background:{{ navTasksBg }};color:{{ navTasksFg }};font-weight:600;font-size:14px;\">\n          <svg width=\"18\" height=\"18\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\"><rect x=\"4\" y=\"5\" width=\"16\" height=\"16\" rx=\"3\" stroke=\"{{ navTasksFg }}\" stroke-width=\"2\"><\u002Frect><path d=\"M4 9H20\" stroke=\"{{ navTasksFg }}\" stroke-width=\"2\"><\u002Fpath><path d=\"M8 3V6\" stroke=\"{{ navTasksFg }}\" stroke-width=\"2\" stroke-linecap=\"round\"><\u002Fpath><path d=\"M16 3V6\" stroke=\"{{ navTasksFg }}\" stroke-width=\"2\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n          Tarefas / Agenda\n        <\u002Fbutton>\n        <button type=\"button\" sc-camel-on-click=\"{{ goFinance }}\" style=\"display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:12px;border:none;cursor:pointer;text-align:left;background:{{ navFinanceBg }};color:{{ navFinanceFg }};font-weight:600;font-size:14px;\">\n          <svg width=\"18\" height=\"18\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\"><rect x=\"3\" y=\"6\" width=\"18\" height=\"13\" rx=\"2\" stroke=\"{{ navFinanceFg }}\" stroke-width=\"2\"><\u002Frect><path d=\"M3 10H21\" stroke=\"{{ navFinanceFg }}\" stroke-width=\"2\"><\u002Fpath><circle cx=\"16\" cy=\"14\" r=\"1.6\" fill=\"{{ navFinanceFg }}\"><\u002Fcircle><\u002Fsvg>\n          Financeiro\n        <\u002Fbutton>\n        <button type=\"button\" sc-camel-on-click=\"{{ goHabits }}\" style=\"display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:12px;border:none;cursor:pointer;text-align:left;background:{{ navHabitsBg }};color:{{ navHabitsFg }};font-weight:600;font-size:14px;\">\n          <svg width=\"18\" height=\"18\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\"><path d=\"M12 20C12 20 4 15.2 4 9.6C4 6.5 6.4 4.5 9 4.5C10.4 4.5 11.4 5.1 12 6C12.6 5.1 13.6 4.5 15 4.5C17.6 4.5 20 6.5 20 9.6C20 15.2 12 20 12 20Z\" stroke=\"{{ navHabitsFg }}\" stroke-width=\"2\"><\u002Fpath><\u002Fsvg>\n          Hábitos\n        <\u002Fbutton>\n        <button type=\"button\" sc-camel-on-click=\"{{ goMetas }}\" style=\"display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:12px;border:none;cursor:pointer;text-align:left;background:{{ navMetasBg }};color:{{ navMetasFg }};font-weight:600;font-size:14px;\">\n          <svg width=\"18\" height=\"18\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\"><path d=\"M12 2L14.5 8.5L21 9.3L16.3 13.8L17.6 20.2L12 17L6.4 20.2L7.7 13.8L3 9.3L9.5 8.5L12 2Z\" stroke=\"{{ navMetasFg }}\" stroke-width=\"2\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n          Metas\n        <\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"display:flex;flex-direction:column;gap:8px;\">\n      <div style=\"display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:12px;color:#E9B9C4;font-weight:600;font-size:14px;\">\n        <svg width=\"18\" height=\"18\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\"><circle cx=\"12\" cy=\"12\" r=\"3\" stroke=\"#E9B9C4\" stroke-width=\"2\"><\u002Fcircle><path d=\"M19.4 15A1.65 1.65 0 0 0 20.7 13.3L20.9 12.9A1.65 1.65 0 0 0 20.7 10.7L19.4 9A1.65 1.65 0 0 0 17.7 8.4L17.3 8.3A1.65 1.65 0 0 0 15.7 9.1L15 10.4A1.65 1.65 0 0 0 8.4 6.3L9.1 5.6A1.65 1.65 0 0 0 6.3 4L5.6 4.6A1.65 1.65 0 0 0 4 6.3\" stroke=\"none\"><\u002Fpath><\u002Fsvg>\n        Configurações\n      <\u002Fdiv>\n      <button type=\"button\" sc-camel-on-click=\"{{ exportData }}\" style=\"display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:12px;border:none;background:#FDEEF1;color:#3B1929;font-weight:700;font-size:13px;cursor:pointer;\">\n        <svg width=\"16\" height=\"16\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\"><path d=\"M12 3V15\" stroke=\"#3B1929\" stroke-width=\"2\" stroke-linecap=\"round\"><\u002Fpath><path d=\"M7 10L12 15L17 10\" stroke=\"#3B1929\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><path d=\"M4 19H20\" stroke=\"#3B1929\" stroke-width=\"2\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n        Exportar backup\n      <\u002Fbutton>\n      <button type=\"button\" sc-camel-on-click=\"{{ triggerImport }}\" style=\"display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:12px;border:1.5px solid #6B3B4C;background:transparent;color:#E9B9C4;font-weight:700;font-size:13px;cursor:pointer;\">\n        <svg width=\"16\" height=\"16\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\"><path d=\"M12 15V3\" stroke=\"#E9B9C4\" stroke-width=\"2\" stroke-linecap=\"round\"><\u002Fpath><path d=\"M7 8L12 3L17 8\" stroke=\"#E9B9C4\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><path d=\"M4 19H20\" stroke=\"#E9B9C4\" stroke-width=\"2\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n        Importar backup\n      <\u002Fbutton>\n      <sc-if value=\"{{ importMessage }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"font-size:11px;color:#F4A6B7;font-weight:700;padding:0 4px;\">{{ importMessage }}<\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- MAIN -->\n  <div style=\"flex:1;overflow-y:auto;padding:34px 42px 42px;display:flex;flex-direction:column;gap:22px;\">\n\n    <sc-if value=\"{{ isHome }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"display:flex;justify-content:space-between;align-items:flex-start;gap:20px;\">\n      <div style=\"flex:1;min-width:0;\">\n        <div style=\"font-family:'Poppins',sans-serif;font-weight:700;font-size:28px;color:#3A2530;white-space:nowrap;\">{{ greeting }}, {{ userName }}<\u002Fdiv>\n        <div style=\"font-size:15px;color:#9A6E7A;font-weight:600;margin-top:6px;\">{{ todayLong }}<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex-shrink:0;background:#fff;border-radius:14px;padding:10px 18px;text-align:center;box-shadow:0 4px 16px rgba(217,79,92,0.08);white-space:nowrap;\">\n        <div style=\"font-size:11px;color:#B37E8A;font-weight:700;text-transform:uppercase;letter-spacing:.04em;\">Este mês<\u002Fdiv>\n        <div style=\"font-family:'Poppins',sans-serif;font-weight:700;font-size:18px;color:#D94F5C;\">{{ monthDoneCount }}/{{ monthTotalCount }} feitas<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ROW 1: three summary cards -->\n    <div style=\"display:grid;grid-template-columns:1.1fr 1.3fr 1fr;gap:18px;\">\n\n      <!-- Finance reminders -->\n      <div style=\"background:{{ colorCoral }};border-radius:20px;padding:20px;color:#fff;display:flex;flex-direction:column;gap:10px;min-height:150px;\">\n        <div style=\"font-family:'Poppins',sans-serif;font-weight:700;font-size:15px;\">Contas de hoje<\u002Fdiv>\n        <sc-if value=\"{{ hasBillsToday }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"display:flex;flex-direction:column;gap:8px;\">\n            <sc-for list=\"{{ billsToday }}\" as=\"bill\" hint-placeholder-count=\"1\">\n              <div style=\"display:flex;justify-content:space-between;align-items:center;gap:8px;background:rgba(255,255,255,0.16);border-radius:12px;padding:9px 12px;\">\n                <div style=\"flex:1;min-width:0;\">\n                  <div style=\"font-weight:700;font-size:14px;\">{{ bill.name }}<\u002Fdiv>\n                  <div style=\"font-size:12px;opacity:.85;\">{{ bill.amountLabel }}<\u002Fdiv>\n                <\u002Fdiv>\n                <button type=\"button\" sc-camel-on-click=\"{{ bill.markPaid }}\" style=\"flex-shrink:0;border:none;background:#fff;color:#D94F5C;font-weight:700;font-size:12px;border-radius:20px;padding:6px 12px;cursor:pointer;white-space:nowrap;\">Marcar pago<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <div style=\"display:flex;flex-direction:column;gap:0;flex:1;justify-content:center;\">\n          <sc-if value=\"{{ noBillsToday }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"font-size:14px;opacity:.9;font-weight:600;\">Nenhuma conta vence hoje.<\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Habits summary -->\n      <div style=\"background:#fff;border-radius:20px;padding:20px;display:flex;flex-direction:column;gap:12px;min-height:150px;box-shadow:0 4px 16px rgba(217,79,92,0.06);\">\n        <div style=\"display:flex;justify-content:space-between;align-items:center;\">\n          <div style=\"font-family:'Poppins',sans-serif;font-weight:700;font-size:15px;color:#3A2530;\">Hábitos de hoje<\u002Fdiv>\n          <div style=\"font-size:12px;color:#B37E8A;font-weight:700;\">{{ waterLabel }}<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#FBDEE4;border-radius:10px;height:10px;overflow:hidden;\">\n          <div style=\"background:{{ colorCoral }};height:100%;border-radius:10px;width:{{ waterPct }};transition:width .3s;\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:8px;\">\n          <button type=\"button\" sc-camel-on-click=\"{{ addWater200 }}\" style=\"flex:1;border:1.5px solid #F4A6B7;background:#fff;color:#D94F5C;font-weight:700;font-size:12px;border-radius:10px;padding:7px 0;cursor:pointer;\">+200ml<\u002Fbutton>\n          <button type=\"button\" sc-camel-on-click=\"{{ addWater300 }}\" style=\"flex:1;border:1.5px solid #F4A6B7;background:#fff;color:#D94F5C;font-weight:700;font-size:12px;border-radius:10px;padding:7px 0;cursor:pointer;\">+300ml<\u002Fbutton>\n          <button type=\"button\" sc-camel-on-click=\"{{ addWater500 }}\" style=\"flex:1;border:1.5px solid #F4A6B7;background:#fff;color:#D94F5C;font-weight:700;font-size:12px;border-radius:10px;padding:7px 0;cursor:pointer;\">+500ml<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:10px;\">\n          <div style=\"font-size:12px;color:#9A6E7A;font-weight:700;white-space:nowrap;\">Acordei às<\u002Fdiv>\n          <input type=\"time\" value=\"{{ wakeTime }}\" sc-camel-on-change=\"{{ setWakeTime }}\" style=\"border:1.5px solid #F3D2DA;border-radius:8px;padding:5px 8px;font-size:13px;font-weight:700;color:#3A2530;background:#FFF8F9;\">\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:8px;\">\n          <button type=\"button\" sc-camel-on-click=\"{{ toggleOferta }}\" style=\"flex:1;border:none;border-radius:10px;padding:8px 0;font-size:12px;font-weight:700;cursor:pointer;background:{{ ofertaBg }};color:{{ ofertaFg }};\">Oferta<\u002Fbutton>\n          <button type=\"button\" sc-camel-on-click=\"{{ toggleAtividade }}\" style=\"flex:1;border:none;border-radius:10px;padding:8px 0;font-size:12px;font-weight:700;cursor:pointer;background:{{ atividadeBg }};color:{{ atividadeFg }};\">Atividade<\u002Fbutton>\n          <button type=\"button\" sc-camel-on-click=\"{{ toggleLeitura }}\" style=\"flex:1;border:none;border-radius:10px;padding:8px 0;font-size:12px;font-weight:700;cursor:pointer;background:{{ leituraBg }};color:{{ leituraFg }};\">Leitura<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Month summary -->\n      <div style=\"background:{{ colorPinkMed }};border-radius:20px;padding:20px;display:flex;flex-direction:column;justify-content:space-between;gap:10px;min-height:150px;color:#3A2530;\">\n        <div style=\"font-family:'Poppins',sans-serif;font-weight:700;font-size:15px;\">Resumo do mês<\u002Fdiv>\n        <div style=\"font-family:'Poppins',sans-serif;font-weight:700;font-size:34px;\">{{ monthPct }}<\u002Fdiv>\n        <div style=\"background:rgba(255,255,255,0.55);border-radius:10px;height:10px;overflow:hidden;\">\n          <div style=\"background:#fff;height:100%;border-radius:10px;width:{{ monthPct }};\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font-size:13px;font-weight:700;opacity:.85;\">{{ monthDoneCount }} de {{ monthTotalCount }} tarefas com data este mês concluídas<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ROW 2: tasks + agenda/calendar -->\n    <div style=\"display:grid;grid-template-columns:1.35fr 1fr;gap:18px;align-items:start;\">\n\n      <!-- Tasks column -->\n      <div style=\"display:flex;flex-direction:column;gap:16px;\">\n\n        <!-- Add task -->\n        <div style=\"background:#fff;border-radius:18px;padding:16px 18px;box-shadow:0 4px 16px rgba(217,79,92,0.06);display:flex;flex-direction:column;gap:10px;\">\n          <div style=\"font-family:'Poppins',sans-serif;font-weight:700;font-size:14px;color:#3A2530;\">Nova tarefa<\u002Fdiv>\n          <div style=\"display:flex;gap:8px;flex-wrap:wrap;\">\n            <input type=\"text\" placeholder=\"O que precisa fazer?\" value=\"{{ newTaskTitle }}\" sc-camel-on-change=\"{{ setNewTaskTitle }}\" style=\"flex:2;min-width:160px;border:1.5px solid #F3D2DA;border-radius:10px;padding:9px 12px;font-size:13px;font-weight:600;color:#3A2530;\">\n            <sc-raw-select value=\"{{ newTaskCategory }}\" sc-camel-on-change=\"{{ setNewTaskCategory }}\" style=\"border:1.5px solid #F3D2DA;border-radius:10px;padding:9px 10px;font-size:13px;font-weight:600;color:#3A2530;background:#fff;\">\n              <sc-for list=\"{{ categories }}\" as=\"cat\" hint-placeholder-count=\"3\">\n                <option value=\"{{ cat }}\">{{ cat }}<\u002Foption>\n              <\u002Fsc-for>\n            <\u002Fsc-raw-select>\n            <input type=\"date\" value=\"{{ newTaskDate }}\" sc-camel-on-change=\"{{ setNewTaskDate }}\" style=\"border:1.5px solid #F3D2DA;border-radius:10px;padding:9px 10px;font-size:13px;font-weight:600;color:#3A2530;\">\n          <\u002Fdiv>\n          <input type=\"text\" placeholder=\"Observação (opcional) — detalhes de como fazer\" value=\"{{ newTaskNote }}\" sc-camel-on-change=\"{{ setNewTaskNote }}\" style=\"border:1.5px solid #F3D2DA;border-radius:10px;padding:9px 12px;font-size:13px;font-weight:600;color:#3A2530;\">\n          <div style=\"display:flex;gap:8px;align-items:center;\">\n            <input type=\"text\" placeholder=\"+ nova categoria\" value=\"{{ newCategoryText }}\" sc-camel-on-change=\"{{ setNewCategoryText }}\" style=\"flex:1;border:1.5px dashed #F3D2DA;border-radius:10px;padding:7px 10px;font-size:12px;font-weight:600;color:#9A6E7A;\">\n            <button type=\"button\" sc-camel-on-click=\"{{ addCategory }}\" style=\"border:1.5px solid #F4A6B7;background:#fff;color:#D94F5C;font-weight:700;font-size:12px;border-radius:10px;padding:7px 12px;cursor:pointer;white-space:nowrap;\">Salvar categoria<\u002Fbutton>\n            <button type=\"button\" sc-camel-on-click=\"{{ addTask }}\" style=\"margin-left:auto;border:none;background:{{ colorCoral }};color:#fff;font-weight:700;font-size:13px;border-radius:10px;padding:9px 18px;cursor:pointer;white-space:nowrap;\">Adicionar<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- Recurring / fixed routine -->\n        <div style=\"background:#fff;border-radius:18px;padding:16px 18px;box-shadow:0 4px 16px rgba(217,79,92,0.06);display:flex;flex-direction:column;gap:12px;\">\n          <div style=\"font-family:'Poppins',sans-serif;font-weight:700;font-size:14px;color:#3A2530;\">Rotina fixa (recorrente)<\u002Fdiv>\n\n          <sc-if value=\"{{ hasRecurring }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"display:flex;flex-direction:column;gap:8px;\">\n              <sc-for list=\"{{ recurringList }}\" as=\"r\" hint-placeholder-count=\"2\">\n                <div style=\"display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:12px;background:#FDF6F7;\">\n                  <div style=\"flex:1;min-width:0;\">\n                    <div style=\"font-size:13.5px;font-weight:700;color:#3A2530;\">{{ r.title }}<\u002Fdiv>\n                    <div style=\"font-size:11px;color:#B37E8A;font-weight:600;\">{{ r.meta }}<\u002Fdiv>\n                  <\u002Fdiv>\n                  <button type=\"button\" sc-camel-on-click=\"{{ r.edit }}\" style=\"border:none;background:transparent;cursor:pointer;flex-shrink:0;\" title=\"Editar\">\n                    <svg width=\"15\" height=\"15\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\"><path d=\"M4 20L4.8 16.5L16 5.3C16.6 4.7 17.6 4.7 18.2 5.3L18.7 5.8C19.3 6.4 19.3 7.4 18.7 8L7.5 19.2L4 20Z\" stroke=\"#C98D98\" stroke-width=\"1.8\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n                  <\u002Fbutton>\n                  <button type=\"button\" sc-camel-on-click=\"{{ r.remove }}\" style=\"border:none;background:transparent;cursor:pointer;flex-shrink:0;\" title=\"Excluir\">\n                    <svg width=\"15\" height=\"15\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\"><path d=\"M4 7H20\" stroke=\"#C98D98\" stroke-width=\"2\" stroke-linecap=\"round\"><\u002Fpath><path d=\"M9 7V4H15V7\" stroke=\"#C98D98\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><path d=\"M6 7L7 20H17L18 7\" stroke=\"#C98D98\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n                  <\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ noRecurring }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"font-size:13px;color:#B37E8A;font-weight:600;\">Nenhuma rotina fixa cadastrada.<\u002Fdiv>\n          <\u002Fsc-if>\n\n          <div style=\"border-top:1.5px solid #FBEBEE;padding-top:12px;display:flex;flex-direction:column;gap:8px;\">\n            <div style=\"font-size:12px;font-weight:700;color:#9A6E7A;\">{{ recurringFormLabel }}<\u002Fdiv>\n            <div style=\"display:flex;gap:8px;flex-wrap:wrap;\">\n              <input type=\"text\" placeholder=\"Ex: Hotseat em grupo\" value=\"{{ recurringTitle }}\" sc-camel-on-change=\"{{ setRecurringTitle }}\" style=\"flex:2;min-width:160px;border:1.5px solid #F3D2DA;border-radius:10px;padding:9px 12px;font-size:13px;font-weight:600;color:#3A2530;\">\n              <sc-raw-select value=\"{{ recurringCategory }}\" sc-camel-on-change=\"{{ setRecurringCategory }}\" style=\"border:1.5px solid #F3D2DA;border-radius:10px;padding:9px 10px;font-size:13px;font-weight:600;color:#3A2530;background:#fff;\">\n                <sc-for list=\"{{ categories }}\" as=\"cat\" hint-placeholder-count=\"3\">\n                  <option value=\"{{ cat }}\">{{ cat }}<\u002Foption>\n                <\u002Fsc-for>\n              <\u002Fsc-raw-select>\n              <input type=\"time\" value=\"{{ recurringTime }}\" sc-camel-on-change=\"{{ setRecurringTime }}\" style=\"border:1.5px solid #F3D2DA;border-radius:10px;padding:9px 10px;font-size:13px;font-weight:600;color:#3A2530;\">\n            <\u002Fdiv>\n            <div style=\"display:flex;gap:6px;\">\n              <sc-for list=\"{{ dayToggles }}\" as=\"dt\" hint-placeholder-count=\"7\">\n                <button type=\"button\" sc-camel-on-click=\"{{ dt.toggle }}\" style=\"flex:1;border:none;border-radius:8px;padding:7px 0;font-size:11px;font-weight:700;cursor:pointer;background:{{ dt.bg }};color:{{ dt.fg }};\">{{ dt.label }}<\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"display:flex;gap:8px;justify-content:flex-end;\">\n              <sc-if value=\"{{ isEditingRecurring }}\" hint-placeholder-val=\"{{ false }}\">\n                <button type=\"button\" sc-camel-on-click=\"{{ cancelRecurringEdit }}\" style=\"border:1.5px solid #F3D2DA;background:#fff;color:#9A6E7A;font-weight:700;font-size:12px;border-radius:10px;padding:8px 14px;cursor:pointer;\">Cancelar<\u002Fbutton>\n              <\u002Fsc-if>\n              <button type=\"button\" sc-camel-on-click=\"{{ saveRecurring }}\" style=\"border:none;background:{{ colorCoral }};color:#fff;font-weight:700;font-size:13px;border-radius:10px;padding:9px 16px;cursor:pointer;\">{{ recurringSaveLabel }}<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- Today's tasks -->\n        <div style=\"background:#fff;border-radius:18px;padding:16px 18px;box-shadow:0 4px 16px rgba(217,79,92,0.06);\">\n          <div style=\"font-family:'Poppins',sans-serif;font-weight:700;font-size:15px;color:#3A2530;margin-bottom:10px;\">Tarefas de hoje<\u002Fdiv>\n          <sc-if value=\"{{ hasTodayTasks }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"display:flex;flex-direction:column;gap:8px;\">\n              <sc-for list=\"{{ todayTasks }}\" as=\"t\" hint-placeholder-count=\"3\">\n                <div style=\"display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:12px;background:{{ t.rowBg }};\">\n                  <button type=\"button\" sc-camel-on-click=\"{{ t.toggle }}\" style=\"width:22px;height:22px;border-radius:7px;border:2px solid {{ t.checkColor }};background:{{ t.checkFill }};cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;\">\n                    <sc-if value=\"{{ t.done }}\" hint-placeholder-val=\"{{ false }}\">\n                      <svg width=\"12\" height=\"12\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\"><path d=\"M4 12L9 17L20 6\" stroke=\"#fff\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n                    <\u002Fsc-if>\n                  <\u002Fbutton>\n                  <div style=\"flex:1;min-width:0;\">\n                    <div style=\"font-size:13.5px;font-weight:700;color:#3A2530;text-decoration:{{ t.strike }};\">{{ t.title }}<\u002Fdiv>\n                    <div style=\"font-size:11px;color:#B37E8A;font-weight:600;\">{{ t.meta }}<\u002Fdiv>\n                    <sc-if value=\"{{ t.hasNote }}\" hint-placeholder-val=\"{{ false }}\">\n                      <div style=\"font-size:11.5px;color:#9A6E7A;font-weight:600;margin-top:2px;font-style:italic;\">{{ t.note }}<\u002Fdiv>\n                    <\u002Fsc-if>\n                  <\u002Fdiv>\n                  <sc-if value=\"{{ t.deletable }}\" hint-placeholder-val=\"{{ false }}\">\n                    <button type=\"button\" sc-camel-on-click=\"{{ t.remove }}\" style=\"border:none;background:transparent;cursor:pointer;flex-shrink:0;\" title=\"Excluir\">\n                      <svg width=\"15\" height=\"15\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\"><path d=\"M4 7H20\" stroke=\"#C98D98\" stroke-width=\"2\" stroke-linecap=\"round\"><\u002Fpath><path d=\"M9 7V4H15V7\" stroke=\"#C98D98\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><path d=\"M6 7L7 20H17L18 7\" stroke=\"#C98D98\" stroke-width=\"2\" stroke-line -radius:8px;padding:8px 0;font-size:11px;font-weight:700;cursor:pointer;background:{{ editGoalMeasurableOffBg }};color:{{ editGoalMeasurableOffFg }};\">Acompanhamento<\u002Fbutton>\n                  <button type=\"button\" sc-camel-on-click=\"{{ setEditGoalMeasurableOn }}\" style=\"flex:1;border:none;border-radius:8px;padding:8px 0;font-size:11px;font-weight:700;cursor:pointer;background:{{ editGoalMeasurableOnBg }};color:{{ editGoalMeasurableOnFg }};\">Com número<\u002Fbutton>\n                <\u002Fdiv>\n                <sc-if value=\"{{ editGoalMeasurable }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"display:flex;gap:6px;\">\n                    <input type=\"number\" placeholder=\"Atual\" value=\"{{ editGoalCurrent }}\" sc-camel-on-change=\"{{ setEditGoalCurrent }}\" style=\"width:70px;border:1.5px solid #F3D2DA;border-radius:8px;padding:7px 8px;font-size:12px;font-weight:600;color:#3A2530;\">\n                    <input type=\"number\" placeholder=\"Meta\" value=\"{{ editGoalTarget }}\" sc-camel-on-change=\"{{ setEditGoalTarget }}\" style=\"width:70px;border:1.5px solid #F3D2DA;border-radius:8px;padding:7px 8px;font-size:12px;font-weight:600;color:#3A2530;\">\n                    <input type=\"text\" placeholder=\"Unidade\" value=\"{{ editGoalUnit }}\" sc-camel-on-change=\"{{ setEditGoalUnit }}\" style=\"flex:1;border:1.5px solid #F3D2DA;border-radius:8px;padding:7px 8px;font-size:12px;font-weight:600;color:#3A2530;\">\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ editGoalMeasurable }}\" hint-placeholder-val=\"{{ true }}\">\n                  <input type=\"text\" placeholder=\"Nota de acompanhamento\" value=\"{{ editGoalNote }}\" sc-camel-on-change=\"{{ setEditGoalNote }}\" style=\"border:1.5px solid #F3D2DA;border-radius:8px;padding:7px 10px;font-size:12px;font-weight:600;color:#3A2530;\">\n                <\u002Fsc-if>\n                <div style=\"display:flex;gap:8px;justify-content:flex-end;\">\n                  <button type=\"button\" sc-camel-on-click=\"{{ cancelEditGoal }}\" style=\"border:1.5px solid #F3D2DA;background:#fff;color:#9A6E7A;font-weight:700;font-size:12px;border-radius:8px;padding:8px 14px;cursor:pointer;\">Cancelar<\u002Fbutton>\n                  <button type=\"button\" sc-camel-on-click=\"{{ saveEditGoal }}\" style=\"border:none;background:{{ colorCoral }};color:#fff;font-weight:700;font-size:12px;border-radius:8px;padding:8px 16px;cursor:pointer;\">Salvar<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ hasGoalCards }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"font-size:13px;color:#B37E8A;font-weight:600;\">Nenhuma meta nessa categoria ainda.<\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fsc-if>\n\n    <!-- ===== SOON PLACEHOLDER ===== -->\n    <sc-if value=\"{{ isSoon }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:14px;padding:60px 0;\">\n        <div style=\"width:64px;height:64px;border-radius:20px;background:{{ colorPinkMed }};\"><\u002Fdiv>\n        <div style=\"font-family:'Poppins',sans-serif;font-weight:700;font-size:20px;color:#3A2530;\">{{ soonLabel }} chega na próxima rodada<\u002Fdiv>\n        <div style=\"font-size:14px;color:#9A6E7A;font-weight:600;max-width:380px;text-align:center;\">Essa aba ainda não foi construída — combinamos de fazer Home primeiro, depois Tarefas/Agenda, e seguir dali.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;userName&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Thagata&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;waterGoalMl&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:3300,&quot;min&quot;:1000,&quot;max&quot;:5000,&quot;step&quot;:100,&quot;tsType&quot;:&quot;number&quot;,&quot;unit&quot;:&quot;ml&quot;},&quot;accentPalette&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:[&quot;#FBDEE4&quot;,&quot;#F4A6B7&quot;,&quot;#D94F5C&quot;],&quot;options&quot;:[[&quot;#FBDEE4&quot;,&quot;#F4A6B7&quot;,&quot;#D94F5C&quot;],[&quot;#F6D9C4&quot;,&quot;#F2B5AD&quot;,&quot;#C1443B&quot;],[&quot;#F3C6D8&quot;,&quot;#E877A0&quot;,&quot;#9B2F4E&quot;]],&quot;tsType&quot;:&quot;string[]&quot;}}\">\nconst STORAGE_KEY = 'cdv_data_v1';\nconst WEEKDAY_LABELS = ['dom','seg','ter','qua','qui','sex','sáb'];\nconst MONTH_NAMES = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];\nconst MONTH_NAMES_SHORT = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];\n\nfunction pad2(n) { return n < 10 ? '0' + n : '' + n; }\nfunction isoDate(d) { return d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate()); }\nfunction monthKey(d) { return d.getFullYear() + '-' + pad2(d.getMonth() + 1); }\nfunction uid() { return Math.random().toString(36).slice(2, 10) + Date.now().toString(36); }\nfunction localDateFromISO(iso) {\n  const [y, m, d] = iso.split('-').map(Number);\n  return new Date(y, m - 1, d);\n}\nfunction addMonthsToISO(iso, n) {\n  const [y, m, d] = iso.split('-').map(Number);\n  const total = (m - 1) + n;\n  const newY = y + Math.floor(total / 12);\n  const newM = ((total % 12) + 12) % 12;\n  const daysInNewMonth = new Date(newY, newM + 1, 0).getDate();\n  const newD = Math.min(d, daysInNewMonth);\n  return newY + '-' + pad2(newM + 1) + '-' + pad2(newD);\n}\nfunction formatBRL(n) { return 'R$ ' + Number(n || 0).toFixed(2).replace('.', ','); }\nconst MOODBOARD_FILES = [\n  'Audi a1.jpg',\n  'How to Increase Instagram Reach for Small Businesses.jpeg',\n  'Instagram.jpeg',\n  'Lençóis maranhense 🏞️.jpeg',\n  'Mi carro deseado.jpe
